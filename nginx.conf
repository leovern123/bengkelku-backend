server {
    listen 8000;
    server_name 103.253.213.184;

    root /var/www/bengkelku/public;
    index index.php index.html;

    charset utf-8;

    # Maximum upload size (for images, etc.)
    client_max_body_size 20M;

    # Main location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Storage access (for uploaded images)
    location /storage {
        alias /var/www/bengkelku/storage/app/public;
        try_files $uri $uri/ =404;
        add_header Access-Control-Allow-Origin *;
    }

    # Deny hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Logging
    access_log /var/log/nginx/bengkelku-access.log;
    error_log /var/log/nginx/bengkelku-error.log;
}